<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Explore the symmetry group of a rectangle (Klein four-group V4) with interactive reflections and a Cayley table.">
    <title>Rectangle Symmetries</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Load 3d-force-graph before Three.js to avoid initialization conflict -->
    <script src="https://unpkg.com/3d-force-graph"></script>
    <script>delete window.__THREE__;</script>
    <!-- Three.js for OrbitControls and main app logic -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>

<body>
    <div id="canvas-container">
        <!-- Renderer will be appended here -->
        <canvas id="overlay-canvas" aria-hidden="true"></canvas>
        <canvas id="cayley-canvas" aria-label="Interactive 3D Cayley graph (drag to rotate, scroll to zoom)"></canvas>
    </div>

    <div id="ui-overlay">
        <div class="panel-handle" aria-hidden="true"></div>
        <header>
            <h1>Symmetries of a Rectangle</h1>
            <p class="subtitle">(The Klein Four-group V<sub>4</sub>)</p>
            <a href="../index.html" class="back-link">← Plane Symmetries</a>
        </header>

        <div class="controls-section">
            <div class="control-group">
                <button id="subgroup-builder-btn" class="btn subgroup-builder-btn">Subgroup Builder</button>
            </div>
            <div id="generator-selector"></div>

            <div class="control-group" data-subgroup-hide>
                <h3>View Options</h3>
                <div class="toggle-row">
                    <label class="switch">
                        <input type="checkbox" id="toggle-axes" checked>
                        <span class="slider round"></span>
                    </label>
                    <span>Show Axes</span>
                </div>
                <div class="toggle-row">
                    <label class="switch">
                        <input type="checkbox" id="toggle-labels" checked>
                        <span class="slider round"></span>
                    </label>
                    <span>Show Vertices</span>
                </div>
                <div class="toggle-row">
                    <label class="switch">
                        <input type="checkbox" id="toggle-perm">
                        <span class="slider round"></span>
                    </label>
                    <span>Show Permutation</span>
                </div>
                <div style="margin-top: 16px; text-align: center;">
                    <button id="reset-shape" class="btn danger" style="width: 100%">Reset</button>
                </div>
            </div>

            <div class="control-group">
                <h3>Rotations (Order 2)</h3>
                <p class="info-text">Rotation by π radians</p>
                <div class="btn-row">
                    <button class="btn" id="rotate-r">r (180°)</button>
                </div>
            </div>

            <div class="control-group">
                <h3>Reflections (Order 2)</h3>
                <p class="info-text">Horizontal and Vertical Reflections</p>
                <div id="reflection-buttons" class="btn-row">
                    <button class="btn" id="reflect-a">a (Horiz)</button>
                    <button class="btn" id="reflect-b">b (Vert)</button>
                </div>
            </div>

            <div class="control-group" data-subgroup-hide>
                <label for="speed-slider" style="color: #777;">Animation Speed</label>
                <div style="display:flex;align-items:center;gap:10px;margin-top:10px;">
                    <input id="speed-slider" type="range" min="1" max="100" value="50" aria-describedby="speed-value" />
                    <span id="speed-value" style="min-width:48px;text-align:right;">0.15</span>
                </div>
            </div>

            <div id="permutation-display" data-subgroup-hide>
                <p>Permutation: <span id="perm-text">e (Identity)</span></p>
            </div>

            <div class="control-group" data-subgroup-hide style="margin-top: 5px;">
                <div class="btn-row">
                    <button id="show-table-btn" class="btn">Show Table</button>
                    <button id="test-table-btn" class="btn secondary">Test Yourself</button>
                </div>
            </div>

        </div>
    </div>

    <!-- Cayley Table Modal -->
    <div id="cayley-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Cayley Table</h2>
                <button class="modal-close" aria-label="Close dialog">&times;</button>
            </div>
            <div id="cayley-table-container">
                <!-- Table injected here -->
            </div>
            <div id="modal-footer" class="modal-footer" style="display: none;">
                <span id="feedback-msg" class="feedback-msg"></span>
                <button id="check-btn" class="btn active">Check</button>
                <button id="reveal-btn" class="btn secondary">Reveal</button>
            </div>
        </div>
    </div>

    <script src="../../cayley-graph.js"></script>
    <script src="script.js"></script>
    <script>
    (function () {
        var overlay = document.getElementById('ui-overlay');
        var handle = overlay ? overlay.querySelector('.panel-handle') : null;
        if (!overlay || !handle) return;
        function toggle() { overlay.classList.toggle('panel-expanded'); }
        handle.addEventListener('click', toggle);
        var hdr = overlay.querySelector('header');
        if (hdr) { hdr.style.cursor = 'pointer'; hdr.addEventListener('click', toggle); }
        // Auto-hide panel on button press; delay the action until collapse finishes.
        // Runs in capture phase to fire before Subgroup Builder's stopImmediatePropagation.
        var controls = overlay.querySelector('.controls-section');
        if (controls) {
            controls.addEventListener('click', function (e) {
                var btn = e.target.closest('.btn');
                if (!btn || btn.classList.contains('subgroup-builder-btn')) return;
                if (btn._deferredClick) return;          // re-dispatched — let through
                if (!overlay.classList.contains('panel-expanded')) return; // already collapsed
                e.stopImmediatePropagation();
                e.preventDefault();
                overlay.classList.remove('panel-expanded');
                var fired = false;
                function fire() {
                    if (fired) return;
                    fired = true;
                    btn._deferredClick = true;
                    btn.click();
                    btn._deferredClick = false;
                }
                controls.addEventListener('transitionend', function onEnd(ev) {
                    if (ev.propertyName !== 'max-height') return;
                    controls.removeEventListener('transitionend', onEnd);
                    fire();
                });
                setTimeout(fire, 400); // fallback in case transitionend does not fire
            }, true);
        }
        // On mobile, shift the canvas so the 3D scene is centred above the collapsed panel strip.
        if (window.matchMedia('(max-width: 640px)').matches) {
            var cc = document.getElementById('canvas-container');
            if (cc) {
                var shift = Math.round(overlay.getBoundingClientRect().height / 2);
                cc.style.transform = 'translateY(-' + shift + 'px)';
            }
        }
    })();
    </script>
</body>

</html>
